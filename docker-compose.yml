services:
  db:
    image: postgres:15-alpine
    restart: always
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER_LOCAL:-marina}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD_LOCAL:-3S!wK7zqP8^tRe5V}
      POSTGRES_DB: ${POSTGRES_DB_NAME:-maria_dubson}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-marina} -d $${POSTGRES_DB:-maria_dubson}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DATABASE_URL=${DATABASE_URL:-postgresql://marina:3S!wK7zqP8^tRe5V@db:5432/maria_dubson?schema=public}
    restart: always
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql://marina:3S!wK7zqP8^tRe5V@db:5432/maria_dubson?schema=public}
      - NODE_ENV=production
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./uploads:/app/uploads
    networks:
      - app-network

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: always
    env_file: .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@marinadubson.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-MarinaAdmin@123##!}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "5050:80"
    depends_on:
      - db
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
